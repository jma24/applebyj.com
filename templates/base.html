<!DOCTYPE html>
<html lang="{{ config.default_language }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ config.title }}{% endblock %}</title>
<meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
<link rel="stylesheet" href="{{ get_url(path='main.css') | safe }}">
<link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path='atom.xml') | safe }}">
<link rel="canonical" href="{{ current_url | default(value=config.base_url) | safe }}">
</head>
<body>
<header>
<a class="site-name" href="{{ config.base_url | safe }}">{{ config.extra.author }}</a>
<nav>
<a href="{{ get_url(path='@/posts/_index.md') | safe }}">Essays</a>
<a href="{{ get_url(path='@/about.md') | safe }}">About</a>
</nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>
<a href="{{ config.extra.github | safe }}">GitHub</a> ·
<a href="{{ config.extra.twitter | safe }}">X</a> ·
<a href="{{ config.extra.linkedin | safe }}">LinkedIn</a> ·
<a href="mailto:{{ config.extra.email }}">Email</a>
</footer>
</body>
</html>
